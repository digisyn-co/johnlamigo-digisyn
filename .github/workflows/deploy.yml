name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via cPanel API
        run: |
          RESULT=$(curl -s -k -X POST \
            "https://digisyn.co:2083/execute/VersionControl/retrieve" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -d "repository_root=/home/digisync/johnlamigo-site")
          echo "Pull result: $RESULT"
          sleep 8

          RESULT2=$(curl -s -k -X POST \
            "https://digisyn.co:2083/execute/VersionControlDeployment/create" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -d "repository_root=/home/digisync/johnlamigo-site")
          echo "Deploy result: $RESULT2"
