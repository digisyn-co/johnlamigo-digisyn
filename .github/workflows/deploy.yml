name: Deploy to cPanel via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: digisyn.co
          username: digisync
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/public_html/johnlamigo.digisyn.cv
            git pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/digisyn-co/johnlamigo-digisyn.git main
