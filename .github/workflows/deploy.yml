name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via cPanel API
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_PASS: ${{ secrets.CPANEL_PASSWORD }}
        run: |
          curl -s -k -X POST \
            "https://server220.orangehost.com:2083/execute/VersionControl/retrieve" \
            -u "${CPANEL_USER}:${CPANEL_PASS}" \
            -d "repository_root=/home/digisync/johnlamigo-site"

          sleep 8

          curl -s -k -X POST \
            "https://server220.orangehost.com:2083/execute/VersionControlDeployment/create" \
            -u "${CPANEL_USER}:${CPANEL_PASS}" \
            -d "repository_root=/home/digisync/johnlamigo-site"

          echo "Done"
