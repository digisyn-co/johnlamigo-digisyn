name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: digisyn.co
          username: digisync
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 7331
          script: |
            cd /home/digisync/johnlamigo-site
            git fetch origin --prune
            git reset --hard origin/main
            git clean -fd
