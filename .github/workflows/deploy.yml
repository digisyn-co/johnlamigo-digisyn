name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest via cPanel API
        run: |
          curl -s -k -X POST \
            "https://digisyn.co:2083/execute/VersionControl/retrieve" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -d "repository_root=/home/digisync/johnlamigo-site"
          sleep 5

          curl -s -k -X POST \
            "https://digisyn.co:2083/execute/VersionControlDeployment/create" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -d "repository_root=/home/digisync/johnlamigo-site"
          sleep 5

          curl -s -k --max-time 30 \
            "https://johnlamigo.digisyn.co/deploy.php?secret=johnlamigo2026" || true

          echo "Deploy triggered successfully"
